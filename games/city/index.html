<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>City</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: #2a1638; touch-action: manipulation;
    font-family: 'Helvetica Neue', 'Arial', system-ui, sans-serif;
    -webkit-user-select: none; user-select: none;
  }
  #game { display: block; width: 100vw; height: 100vh; }

  .ui { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #fff; pointer-events: none; z-index: 10; }
  .ui.hidden { display: none; }

  #menu { justify-content: flex-end; padding-bottom: 13vh; transition: opacity .4s ease; }
  .brand {
    font-weight: 800; font-size: clamp(60px, 18vw, 150px); line-height: .88;
    letter-spacing: 9px; margin: 0; color: #fff;
    text-shadow: 0 3px 0 rgba(90,30,50,.35), 0 16px 44px rgba(30,10,30,.55);
  }
  .brand-sub {
    font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
    font-size: clamp(11px, 3vw, 14px); opacity: .95; margin: 16px 0 30px;
    text-shadow: 0 2px 14px rgba(20,10,30,.7);
  }
  .btn {
    pointer-events: auto; cursor: pointer; border: 0; border-radius: 12px;
    padding: 18px 66px; font-size: 20px; font-weight: 800; letter-spacing: 2px;
    font-family: inherit; color: #2a1020; text-transform: uppercase;
    background: linear-gradient(180deg, #ffe08a, #f6b52e);
    box-shadow: 0 10px 28px rgba(120,50,20,.5), inset 0 1px 0 rgba(255,255,255,.55);
    margin: 7px; transition: transform .1s ease, box-shadow .1s ease;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 5px 16px rgba(120,50,20,.5); }
  .btn.ghost { background: rgba(255,255,255,.92); color: #2a2030; box-shadow: 0 10px 28px rgba(20,10,30,.35), inset 0 1px 0 rgba(255,255,255,.6); }
  .stat { font-weight: 700; font-size: 14px; letter-spacing: 1px; margin-top: 22px; opacity: .92; text-shadow: 0 2px 12px rgba(20,10,30,.7); font-variant-numeric: tabular-nums; }

  /* HUD */
  #hud { position: fixed; top: 0; left: 0; right: 0; z-index: 5; display: flex; justify-content: space-between; align-items: flex-start; padding: 18px 20px; pointer-events: none; color: #fff; }
  #hudLeft { display: flex; flex-direction: column; line-height: 1; }
  #hudHeight { font-size: 54px; font-weight: 800; font-variant-numeric: tabular-nums; text-shadow: 0 3px 16px rgba(10,10,30,.6); }
  #hudPct { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: .9; margin-top: 4px; text-shadow: 0 2px 10px rgba(10,10,30,.7); }
  #hudRight { text-align: right; font-weight: 700; font-size: 13px; letter-spacing: 1px; opacity: .95; line-height: 1.7; text-shadow: 0 2px 10px rgba(10,10,30,.7); font-variant-numeric: tabular-nums; }

  #toast { position: fixed; top: 26%; left: 0; right: 0; text-align: center; font-size: 30px; font-weight: 800; letter-spacing: 1px; color: #fff; z-index: 6; pointer-events: none; opacity: 0; transition: opacity .16s ease, transform .16s ease; text-shadow: 0 3px 18px rgba(10,10,30,.7); }
  @media (prefers-reduced-motion: reduce) { #toast { transition: none; } #menu { transition: none; } }

  /* game-over: buttons pinned bottom, comparison drawn on canvas above */
  #over { justify-content: flex-end; padding-bottom: 7vh; }
  #over .btnrow { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud" style="display:none">
  <div id="hudLeft">
    <div id="hudHeight">10 m</div>
    <div id="hudPct">1% of Burj Khalifa</div>
  </div>
  <div id="hudRight">
    <div id="hudBest">Best 0 m</div>
    <div id="hudBestPct">0%</div>
  </div>
</div>
<div id="toast"></div>

<div id="menu" class="ui">
  <h1 class="brand">CITY</h1>
  <div class="brand-sub">Build your tower toward the Burj Khalifa</div>
  <button class="btn" id="playBtn">Play</button>
  <div class="stat" id="menuBest">Best 0 m</div>
</div>

<div id="over" class="ui hidden">
  <div class="btnrow">
    <button class="btn" id="continueBtn">▲ Recover my building (Ad)</button>
    <button class="btn ghost" id="retryBtn">New building</button>
  </div>
</div>

<script>
'use strict';
// ======================================================================
// CITY — stack a tower floor by floor and chase the Burj Khalifa (828 m).
// Base floor 10 m, every placed floor +5 m. Perfect drops keep full width
// (no regrow). Topple to zoom out and compare your tower to the Burj.
// ======================================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const BASE_A = 0.52, BASE_B = 0.30, BASE_C = 0.52;
let A = BASE_A, B = BASE_B, C = BASE_C;
let W = 0, H = 0, DPR = 1, groundY = 0, lastS = -1;
let PX = 0, PY = 0;
function project(x, y, z) { return { x: PX + (x - z) * A, y: PY + (x + z) * B - y * C }; }

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  groundY = H * 0.72;
  applyGameScale();
  buildHomeCity();
}
function applyGameScale() {
  const S = Math.max(0.72, Math.min(1.4, Math.min(W, H) / 720));
  A = BASE_A * S; B = BASE_B * S; C = BASE_C * S;
}
window.addEventListener('resize', resize);

// ---------- CrazyGames SDK (graceful fallback) ----------
let cgSdk = null;
(function initSdk() {
  const s = document.createElement('script');
  s.src = 'https://sdk.crazygames.com/crazygames-sdk-v3.js';
  s.onload = async () => { try { await window.CrazyGames.SDK.init(); cgSdk = window.CrazyGames.SDK; } catch (e) {} };
  s.onerror = () => {};
  document.head.appendChild(s);
})();
function sdkStart() { try { cgSdk && cgSdk.game.gameplayStart(); } catch (e) {} }
function sdkStop()  { try { cgSdk && cgSdk.game.gameplayStop(); } catch (e) {} }
function showRewardedAd(cb) {
  if (cgSdk) { try { cgSdk.ad.requestAd('rewarded', { adFinished: cb, adError: () => cb() }); return; } catch (e) {} }
  setTimeout(cb, 600);
}

// ---------- helpers ----------
function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }
function sub(a, b) { return { x: a.x - b.x, y: a.y - b.y }; }
function add(a, b) { return { x: a.x + b.x, y: a.y + b.y }; }
function mul(a, s) { return { x: a.x * s, y: a.y * s }; }
function hexRgb(h) { h = h.replace('#', ''); return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)]; }
function rgbHex(r, g, b) { return '#' + [r, g, b].map(v => clamp(Math.round(v), 0, 255).toString(16).padStart(2, '0')).join(''); }
function shade(hex, amt) { const [r, g, b] = hexRgb(hex); const t = amt < 0 ? 0 : 255, p = Math.abs(amt); return rgbHex(r + (t - r) * p, g + (t - g) * p, b + (t - b) * p); }
function lerpHex(h1, h2, t) { const a = hexRgb(h1), b = hexRgb(h2); return rgbHex(a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t); }
function hash3(a, b, c) { const x = Math.sin(a * 127.1 + b * 311.7 + c * 74.7) * 43758.5453; return x - Math.floor(x); }
function mulberry32(a) { return function () { a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }

// ---------- constants ----------
const SIZE = 300, BH = 56, PODIUM_H = 78;
const PERF = 11;                 // perfect tolerance (tighter = harder)
const BURJ_M = 828;              // Burj Khalifa height, metres
const BASE_M = 10, STEP_M = 5;   // first floor 10 m, each floor +5 m

// ---------- draw primitives ----------
function fillQuad(g, a, b, c, d, color) { g.fillStyle = color; g.beginPath(); g.moveTo(a.x, a.y); g.lineTo(b.x, b.y); g.lineTo(c.x, c.y); g.lineTo(d.x, d.y); g.closePath(); g.fill(); }
function faceWin(g, O, U, V, cols, rows, win) {
  const fm = 0.17;
  for (let i = 0; i < cols; i++) for (let j = 0; j < rows; j++) {
    const u0 = (i + fm) / cols, u1 = (i + 1 - fm) / cols, v0 = (j + fm) / rows, v1 = (j + 1 - fm) / rows;
    const a = add(add(O, mul(U, u0)), mul(V, v0)), b = add(add(O, mul(U, u1)), mul(V, v0));
    const c = add(add(O, mul(U, u1)), mul(V, v1)), d = add(add(O, mul(U, u0)), mul(V, v1));
    g.fillStyle = hash3(win.seed, i, j) < win.litP ? win.lit : win.glass;
    g.beginPath(); g.moveTo(a.x, a.y); g.lineTo(b.x, b.y); g.lineTo(c.x, c.y); g.lineTo(d.x, d.y); g.closePath(); g.fill();
  }
}
function drawBox(g, x0, z0, x1, z1, yb, yt, col, win) {
  const tBB = project(x0, yt, z0), tRB = project(x1, yt, z0), tRF = project(x1, yt, z1), tLF = project(x0, yt, z1);
  const bRB = project(x1, yb, z0), bRF = project(x1, yb, z1), bLF = project(x0, yb, z1);
  fillQuad(g, tBB, tRB, tRF, tLF, col.top);
  fillQuad(g, tRB, tRF, bRF, bRB, col.right);
  fillQuad(g, tLF, tRF, bRF, bLF, col.left);
  if (win) {
    faceWin(g, tRB, sub(tRF, tRB), sub(bRB, tRB), win.colsR, win.rows, win);
    faceWin(g, tRF, sub(tLF, tRF), sub(bRF, tRF), win.colsL, win.rows, win);
  }
  g.strokeStyle = 'rgba(20,20,40,.18)'; g.lineWidth = 1;
  g.beginPath(); g.moveTo(tRF.x, tRF.y); g.lineTo(bRF.x, bRF.y); g.stroke();
}

// ======================================================================
//  SKY — red/purple at the base fading up into a blue night (never black)
// ======================================================================
const SKY = [
  [0, '#d6472f'], [55, '#b23a5c'], [130, '#7c3d86'], [240, '#4a3c81'],
  [400, '#2e3767'], [640, '#212a50'], [1000, '#1a2346'],
];
function skyColorAt(m) {
  m = Math.max(0, m);
  for (let i = 0; i < SKY.length - 1; i++) {
    if (m <= SKY[i + 1][0]) { const t = (m - SKY[i][0]) / (SKY[i + 1][0] - SKY[i][0]); return lerpHex(SKY[i][1], SKY[i + 1][1], t); }
  }
  return SKY[SKY.length - 1][1];
}
function altAtScreenY(sy) { const worldY = (groundY + camY * C - sy) / C; return worldY * (STEP_M / BH); }
function drawSky(g) {
  const grad = g.createLinearGradient(0, 0, 0, H);
  for (let k = 0; k <= 8; k++) { const sy = H * k / 8; grad.addColorStop(k / 8, skyColorAt(altAtScreenY(sy))); }
  g.fillStyle = grad; g.fillRect(0, 0, W, H);
  // stars fade in high up (kept faint; never full black anyway)
  const topAlt = altAtScreenY(0);
  if (topAlt > 220) {
    const a = clamp((topAlt - 220) / 500, 0, 0.7);
    g.fillStyle = 'rgba(255,255,255,' + a + ')';
    for (let i = 0; i < 60; i++) { const sx = (i * 149 + 23) % W, sy = (i * 83 + 41) % (H * 0.55); g.fillRect(sx, sy, 1.6, 1.6); }
  }
}

// ======================================================================
//  BURJ KHALIFA silhouette (stylised, scalable)
// ======================================================================
const BURJ = [
  [0.00, 1.00], [0.06, 0.95], [0.06, 0.86], [0.16, 0.82], [0.16, 0.72], [0.28, 0.68],
  [0.28, 0.58], [0.40, 0.55], [0.40, 0.46], [0.52, 0.44], [0.52, 0.36], [0.63, 0.34],
  [0.63, 0.26], [0.72, 0.24], [0.72, 0.17], [0.80, 0.15], [0.80, 0.10], [0.87, 0.085],
  [0.87, 0.05], [0.93, 0.045], [1.00, 0.006],
];
function burjPath(g, cx, baseY, hpx) {
  const mh = hpx * 0.075;
  g.beginPath();
  g.moveTo(cx - BURJ[0][1] * mh, baseY);
  for (let i = 0; i < BURJ.length; i++) g.lineTo(cx - BURJ[i][1] * mh, baseY - BURJ[i][0] * hpx);
  for (let i = BURJ.length - 1; i >= 0; i--) g.lineTo(cx + BURJ[i][1] * mh, baseY - BURJ[i][0] * hpx);
  g.closePath();
}
function drawBurj(g, cx, baseY, hpx, fill) { burjPath(g, cx, baseY, hpx); g.fillStyle = fill; g.fill(); }

// left-edge progress gauge during play
function drawBurjGauge(g) {
  const hpx = H * 0.7, baseY = H * 0.9, cx = 42;
  drawBurj(g, cx, baseY, hpx, 'rgba(255,255,255,.13)');
  const frac = clamp(heightM() / BURJ_M, 0, 1), markY = baseY - frac * hpx;
  g.save(); burjPath(g, cx, baseY, hpx); g.clip();
  g.fillStyle = 'rgba(255,222,150,.92)'; g.fillRect(0, markY, 120, baseY - markY);
  g.restore();
  g.strokeStyle = 'rgba(255,255,255,.75)'; g.lineWidth = 1.5; g.setLineDash([4, 4]);
  g.beginPath(); g.moveTo(6, markY); g.lineTo(92, markY); g.stroke(); g.setLineDash([]);
  g.fillStyle = 'rgba(255,255,255,.85)'; g.textAlign = 'left';
  g.font = '700 11px Helvetica, Arial'; g.fillText('828 m', 12, baseY - hpx - 6);
  g.font = '800 12px Helvetica, Arial'; g.fillText(heightM() + ' m', 12, markY - 6);
}

// ======================================================================
//  HOME-SCREEN CITY  — polished static golden-hour skyline
// ======================================================================
let homeCanvas = null, homeCtx = null;
function buildHomeCity() {
  if (!homeCanvas) { homeCanvas = document.createElement('canvas'); homeCtx = homeCanvas.getContext('2d'); }
  homeCanvas.width = W; homeCanvas.height = H;
  const g = homeCtx, rnd = mulberry32(99);
  // warm sky
  const sky = g.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#3a2456'); sky.addColorStop(0.34, '#7e3a63');
  sky.addColorStop(0.6, '#c85a3c'); sky.addColorStop(0.78, '#ef9a3c'); sky.addColorStop(1, '#f7c664');
  g.fillStyle = sky; g.fillRect(0, 0, W, H);
  // sun
  const sunX = W * 0.5, sunY = H * 0.66;
  const sg = g.createRadialGradient(sunX, sunY, 6, sunX, sunY, H * 0.55);
  sg.addColorStop(0, 'rgba(255,244,210,.95)'); sg.addColorStop(0.2, 'rgba(255,210,140,.7)'); sg.addColorStop(1, 'rgba(255,170,110,0)');
  g.fillStyle = sg; g.fillRect(0, 0, W, H);
  g.fillStyle = 'rgba(255,248,224,.95)'; g.beginPath(); g.arc(sunX, sunY, H * 0.05, 0, Math.PI * 2); g.fill();

  // building layers back -> front (hazier & warmer in back, darker in front)
  const layers = [
    { y: H * 0.60, hMin: 0.10, hMax: 0.26, col: '#c8734f', haze: 0.55, win: 0.5, wcol: '#ffd98a' },
    { y: H * 0.66, hMin: 0.14, hMax: 0.34, col: '#9a5142', haze: 0.35, win: 0.7, wcol: '#ffcf7c' },
    { y: H * 0.74, hMin: 0.18, hMax: 0.46, col: '#5f3446', haze: 0.16, win: 0.9, wcol: '#ffc46a' },
    { y: H * 0.84, hMin: 0.22, hMax: 0.6, col: '#341f34', haze: 0.05, win: 1.0, wcol: '#ffbf63' },
  ];
  for (const L of layers) {
    let x = -30;
    const base = lerpHex(L.col, '#f2b062', L.haze);
    while (x < W + 30) {
      const bw = 34 + rnd() * 66, bh = (L.hMin + rnd() * (L.hMax - L.hMin)) * H;
      const bx = x, by = L.y - bh;
      g.fillStyle = base; g.fillRect(bx, by, bw, bh + H);
      // top edge highlight (sun-catch)
      g.fillStyle = lerpHex(base, '#ffe3a6', 0.4); g.fillRect(bx, by, bw, 3);
      // windows
      const cols = Math.max(1, Math.floor(bw / 13)), rows = Math.floor(bh / 15);
      for (let ci = 0; ci < cols; ci++) for (let ri = 0; ri < rows; ri++) {
        if (rnd() < 0.5 * L.win) {
          g.fillStyle = rnd() < 0.7 ? L.wcol : lerpHex(L.wcol, base, 0.5);
          g.globalAlpha = 0.55 + rnd() * 0.45;
          g.fillRect(bx + 4 + ci * 13, by + 6 + ri * 15, 6, 8);
          g.globalAlpha = 1;
        }
      }
      x += bw + 5 + rnd() * 8;
    }
  }
  // soft foreground haze + vignette
  const hz = g.createLinearGradient(0, H * 0.7, 0, H);
  hz.addColorStop(0, 'rgba(30,16,34,0)'); hz.addColorStop(1, 'rgba(24,12,28,.5)');
  g.fillStyle = hz; g.fillRect(0, H * 0.7, W, H * 0.3);
  const vg = g.createRadialGradient(W / 2, H * 0.5, H * 0.3, W / 2, H * 0.5, H * 0.85);
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(20,8,24,.4)');
  g.fillStyle = vg; g.fillRect(0, 0, W, H);
}

// ======================================================================
//  GAME
// ======================================================================
const S = { MENU: 0, PLAY: 1, DEAD: 2 };
let state = S.MENU;
let stack = null, mover = null, debris = [], sparks = [];
let score = 0, bestM = 0, camY = 0, camYT = 0, shake = 0, usedContinue = false, endT = 0;
bestM = +(localStorage.getItem('city_best_m') || 0);

function heightM() { return BASE_M + STEP_M * score; }
function pctOfBurj(m) { return Math.round(m / BURJ_M * 100); }

function reset() {
  const hw = SIZE / 2;
  stack = [{ x0: -hw, z0: -hw, x1: hw, z1: hw, podium: true }];
  debris = []; sparks = [];
  score = 0; camY = 0; camYT = 0; shake = 0; usedContinue = false; endT = 0;
  mover = null;
}
function newMover() {
  const top = stack[stack.length - 1];
  const axis = stack.length % 2 === 1 ? 'x' : 'z';
  const spd = Math.min(300 + score * 9, 700);
  const w = top.x1 - top.x0, d = top.z1 - top.z0;
  mover = { axis, spd, len: axis === 'x' ? w : d, dir: Math.random() < 0.5 ? 1 : -1, wob: Math.random() * 6 };
  mover.off = mover.dir > 0 ? -430 : 430;
}
function moverRect() {
  const top = stack[stack.length - 1];
  if (mover.axis === 'x') return { x0: mover.off - mover.len / 2, x1: mover.off + mover.len / 2, z0: top.z0, z1: top.z1 };
  return { x0: top.x0, x1: top.x1, z0: mover.off - mover.len / 2, z1: mover.off + mover.len / 2 };
}
function drop() {
  const top = stack[stack.length - 1], r = moverRect(), ax = mover.axis;
  const mLo = ax === 'x' ? r.x0 : r.z0, mHi = ax === 'x' ? r.x1 : r.z1;
  const tLo = ax === 'x' ? top.x0 : top.z0, tHi = ax === 'x' ? top.x1 : top.z1;
  const lo = Math.max(mLo, tLo), hi = Math.min(mHi, tHi), overlap = hi - lo;
  if (overlap <= 0) return die();
  const offset = Math.abs((mLo + mHi) / 2 - (tLo + tHi) / 2), perfect = offset <= PERF;
  const block = { x0: r.x0, z0: r.z0, x1: r.x1, z1: r.z1 };
  if (perfect) {
    // slot exactly into place — keep full width, no regrow
    if (ax === 'x') { block.x0 = tLo; block.x1 = tHi; } else { block.z0 = tLo; block.z1 = tHi; }
    spawnSparks(block); shake = 5; toast('PERFECT');
  } else {
    const cutLo = mLo < tLo, cut = cutLo ? (tLo - mLo) : (mHi - tHi);
    if (cut > 1) {
      const d = { x0: r.x0, z0: r.z0, x1: r.x1, z1: r.z1, vy: 40, fall: 0 };
      if (ax === 'x') { if (cutLo) d.x1 = tLo; else d.x0 = tHi; } else { if (cutLo) d.z1 = tLo; else d.z0 = tHi; }
      debris.push(d);
    }
    if (ax === 'x') { block.x0 = lo; block.x1 = hi; } else { block.z0 = lo; block.z1 = hi; }
  }
  block.w = block.x1 - block.x0; block.d = block.z1 - block.z0;
  stack.push(block); score++;
  camYT = Math.max(0, stack.length * BH - (0.42 * H) / C);
  updateHud(); newMover();
}
function die() {
  state = S.DEAD; sdkStop(); shake = 10; endT = 0;
  const m = heightM();
  if (m > bestM) { bestM = m; localStorage.setItem('city_best_m', bestM); }
  const r = moverRect(); debris.push({ ...r, vy: 20, fall: 0 });
  continueBtn.style.display = usedContinue ? 'none' : '';
  overEl.classList.remove('hidden'); hudEl.style.display = 'none';
}
function spawnSparks(b) {
  const cx = (b.x0 + b.x1) / 2, cz = (b.z0 + b.z1) / 2, y = stack.length * BH;
  for (let i = 0; i < 22; i++) { const a = Math.random() * 6.28, r = 40 + Math.random() * 60; sparks.push({ x: cx + Math.cos(a) * r, z: cz + Math.sin(a) * r, y, vy: 130 + Math.random() * 150, life: .5 + Math.random() * .5 }); }
}

// ---------- floor styling (windows kept) ----------
function floorColors(i) { return { top: '#a9d3e0', frame: '#33526b', glass: lerpHex('#8fc2d6', '#a9d8e8', (Math.sin(i * .7) + 1) / 2 * .5), lit: '#ffe3a1' }; }
function drawFloor(g, b, i, yb, yt) {
  const w = b.x1 - b.x0, d = b.z1 - b.z0;
  if (b.podium) {
    drawBox(g, b.x0, b.z0, b.x1, b.z1, yb, yt, { top: '#b9b3a6', right: '#8f887b', left: '#7c766a' }, null);
    return;
  }
  if (Math.min(w, d) < 76) { drawBox(g, b.x0, b.z0, b.x1, b.z1, yb, yt, { top: '#c6cdd1', right: '#93a3ac', left: '#7d8d97' }, null); return; }
  const c = floorColors(i);
  drawBox(g, b.x0, b.z0, b.x1, b.z1, yb, yt, { top: c.top, right: c.frame, left: shade(c.frame, -0.1) },
    { colsR: clamp(Math.round(d / 42), 2, 7), colsL: clamp(Math.round(w / 42), 2, 7), rows: 1, glass: c.glass, lit: c.lit, litP: 0.16, seed: (i * 13) % 999 });
}
function floorBaseY(i) { return i === 0 ? 0 : PODIUM_H + (i - 1) * BH; }
function floorTopY(i) { return i === 0 ? PODIUM_H : PODIUM_H + i * BH; }

// ---------- input (instant, no latency) ----------
function press(e) {
  if (e && e.type === 'keydown' && e.code !== 'Space') return;
  if (e) e.preventDefault();
  if (state === S.PLAY) drop();
}
canvas.addEventListener('pointerdown', press, { passive: false });
window.addEventListener('keydown', press);

// ---------- UI ----------
const menuEl = document.getElementById('menu'), overEl = document.getElementById('over'), hudEl = document.getElementById('hud');
const hudHeightEl = document.getElementById('hudHeight'), hudPctEl = document.getElementById('hudPct'), hudBestEl = document.getElementById('hudBest'), hudBestPctEl = document.getElementById('hudBestPct');
const toastEl = document.getElementById('toast'), continueBtn = document.getElementById('continueBtn');
document.getElementById('menuBest').textContent = 'Best ' + bestM + ' m';
function updateHud() {
  const m = heightM();
  hudHeightEl.textContent = m + ' m';
  hudPctEl.textContent = pctOfBurj(m) + '% of Burj Khalifa';
  hudBestEl.textContent = 'Best ' + Math.max(bestM, m) + ' m';
  hudBestPctEl.textContent = pctOfBurj(Math.max(bestM, m)) + '%';
}
let toastTimer = 0;
function toast(msg) { toastEl.textContent = msg; toastEl.style.opacity = 1; toastEl.style.transform = 'scale(1.1)'; clearTimeout(toastTimer); toastTimer = setTimeout(() => { toastEl.style.opacity = 0; toastEl.style.transform = 'scale(1)'; }, 650); }
function startGame() {
  applyGameScale();
  reset(); state = S.PLAY; menuEl.classList.add('hidden'); overEl.classList.add('hidden');
  hudEl.style.display = 'flex'; updateHud(); newMover(); sdkStart();
}
document.getElementById('playBtn').addEventListener('click', startGame);
document.getElementById('retryBtn').addEventListener('click', startGame);
continueBtn.addEventListener('click', () => {
  continueBtn.disabled = true;
  showRewardedAd(() => { continueBtn.disabled = false; usedContinue = true; state = S.PLAY; applyGameScale(); overEl.classList.add('hidden'); hudEl.style.display = 'flex'; newMover(); sdkStart(); });
});

// ---------- loop ----------
let last = performance.now();
function loop(now) { const dt = Math.min((now - last) / 1000, 0.05); last = now; update(dt, now / 1000); render(now / 1000); requestAnimationFrame(loop); }
function update(dt, t) {
  camY += (camYT - camY) * Math.min(1, dt * 6);
  if (shake > 0) shake = Math.max(0, shake - dt * 26);
  if (state === S.DEAD) endT = Math.min(1, endT + dt * 1.8);
  if (state === S.PLAY && mover) {
    const wob = 1 + 0.2 * Math.sin(t * 2 + mover.wob);
    mover.off += mover.dir * mover.spd * wob * dt;
    if (mover.off < -430) { mover.off = -430; mover.dir = 1; }
    if (mover.off > 430) { mover.off = 430; mover.dir = -1; }
  }
  for (const d of debris) { d.vy += 1400 * dt; d.fall += d.vy * dt; }
  debris = debris.filter(d => d.fall < 3000);
  for (const p of sparks) { p.y += p.vy * dt; p.vy -= 300 * dt; p.life -= dt; }
  sparks = sparks.filter(p => p.life > 0);
}

// ---------- tower render (iso, during play) ----------
function renderTower(shx, shy) {
  PX = W / 2 + shx; PY = groundY + camY * C + shy;
  for (const d of debris) { const yb = stack.length * BH - d.fall; drawBox(ctx, d.x0, d.z0, d.x1, d.z1, yb, yb + BH, { top: '#c6cdd1', right: '#9aa7b0', left: '#84919b' }, null); }
  const firstVis = Math.max(0, stack.length - 26);
  for (let i = firstVis; i < stack.length; i++) drawFloor(ctx, stack[i], i, floorBaseY(i), floorTopY(i));
  if (state === S.PLAY && mover) {
    const r = moverRect(), base = PODIUM_H + (stack.length - 1) * BH;
    drawFloor(ctx, r, stack.length, base, base + BH);
    const top = stack[stack.length - 1];
    ctx.strokeStyle = 'rgba(255,255,255,.5)'; ctx.lineWidth = 1.5; ctx.setLineDash([5, 6]); ctx.beginPath();
    const yT = base, cyz = (top.z0 + top.z1) / 2, cxx = (top.x0 + top.x1) / 2;
    if (mover.axis === 'x') {
      let p = project(top.x0, yT, cyz), q = project(top.x0, yT + BH, cyz); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);
      p = project(top.x1, yT, cyz); q = project(top.x1, yT + BH, cyz); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);
    } else {
      let p = project(cxx, yT, top.z0), q = project(cxx, yT + BH, top.z0); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);
      p = project(cxx, yT, top.z1); q = project(cxx, yT + BH, top.z1); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);
    }
    ctx.stroke(); ctx.setLineDash([]);
  }
  for (const p of sparks) { const s = project(p.x, p.y, p.z); ctx.globalAlpha = Math.max(p.life, 0); ctx.fillStyle = '#fff0c2'; ctx.fillRect(s.x - 2, s.y - 2, 4, 4); }
  ctx.globalAlpha = 1;
}

// ---------- end-screen comparison (3D isometric, zoom-out, always to scale) ----------
const BH_PER_M = BH / STEP_M;          // world units per metre
function easeOut(t) { return 1 - Math.pow(1 - clamp(t, 0, 1), 3); }
function drawCompSky(g) {
  const grad = g.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, skyColorAt(1000)); grad.addColorStop(0.4, skyColorAt(300));
  grad.addColorStop(0.72, skyColorAt(90)); grad.addColorStop(1, skyColorAt(0));
  g.fillStyle = grad; g.fillRect(0, 0, W, H);
  g.fillStyle = 'rgba(255,255,255,.5)';
  for (let i = 0; i < 46; i++) { const sx = (i * 149 + 23) % W, sy = (i * 83 + 41) % (H * 0.38); g.fillRect(sx, sy, 1.5, 1.5); }
}
function groundShadow(g, wx, wz, rad) {
  const s = project(wx, 0, wz);
  const gr = g.createRadialGradient(s.x, s.y, 2, s.x, s.y, rad);
  gr.addColorStop(0, 'rgba(10,10,25,.35)'); gr.addColorStop(1, 'rgba(10,10,25,0)');
  g.fillStyle = gr; g.beginPath(); g.ellipse(s.x, s.y, rad, rad * 0.5, 0, 0, Math.PI * 2); g.fill();
}
function drawBurj3D(g, bx, bz) {
  const Hb = BURJ_M * BH_PER_M, baseHalf = SIZE * 0.92;
  for (let i = 0; i < BURJ.length - 1; i++) {
    const y0 = BURJ[i][0] * Hb, y1 = BURJ[i + 1][0] * Hb;
    if (y1 <= y0) continue;
    const half = baseHalf * Math.max(BURJ[i][1], BURJ[i + 1][1]);
    const tint = i / BURJ.length;
    drawBox(g, bx - half, bz - half, bx + half, bz + half, y0, y1,
      { top: lerpHex('#e7edf3', '#cfe0ea', tint), right: lerpHex('#a9bccb', '#93aec0', tint), left: lerpHex('#8ea3b4', '#7c98ab', tint) }, null);
  }
}
function drawFloorOff(g, b, i, ox, oz) {
  drawFloor(g, { x0: b.x0 + ox, z0: b.z0 + oz, x1: b.x1 + ox, z1: b.z1 + oz, podium: b.podium, w: b.w, d: b.d }, i, floorBaseY(i), floorTopY(i));
}
function renderComparison() {
  drawCompSky(ctx);
  const compC = 0.56 * H / (BURJ_M * BH_PER_M);
  const e = easeOut(endT), startMul = 2.6;
  const Cn = compC * (startMul + (1 - startMul) * e);
  A = Cn; B = Cn * 0.577; C = Cn;
  const sep = 0.20 * W / compC;                 // fixed world separation
  PX = W * 0.62 - sep * A; PY = H * 0.63;
  const bx = -sep / 2, bz = sep / 2, tox = sep / 2, toz = -sep / 2;
  // shadows + 3D models
  groundShadow(ctx, bx, bz, SIZE * A * 1.4);
  groundShadow(ctx, tox, toz, SIZE * A * 0.9);
  drawBurj3D(ctx, bx, bz);
  for (let i = 0; i < stack.length; i++) drawFloorOff(ctx, stack[i], i, tox, toz);
  // labels fade in once mostly zoomed out
  const la = clamp((endT - 0.45) / 0.4, 0, 1), m = heightM();
  const bb = project(bx, 0, bz), tb = project(tox, 0, toz);
  ctx.globalAlpha = la; ctx.textAlign = 'center'; ctx.fillStyle = '#fff';
  ctx.font = '700 12px Helvetica, Arial'; ctx.fillText('BURJ KHALIFA', bb.x, PY + 26);
  ctx.font = '800 15px Helvetica, Arial'; ctx.fillText('828 m', bb.x, PY + 46);
  ctx.font = '700 12px Helvetica, Arial'; ctx.fillText('YOUR TOWER', tb.x, PY + 26);
  ctx.font = '800 15px Helvetica, Arial'; ctx.fillText(m + ' m', tb.x, PY + 46);
  ctx.font = '800 38px Helvetica, Arial'; ctx.fillText(pctOfBurj(m) + '% of the Burj', W / 2, H * 0.14);
  ctx.font = '700 14px Helvetica, Arial'; ctx.fillStyle = 'rgba(255,255,255,.85)';
  ctx.fillText('Best ' + bestM + ' m · ' + pctOfBurj(bestM) + '%', W / 2, H * 0.14 + 26);
  ctx.globalAlpha = 1; ctx.textAlign = 'left';
}

// ---------- render ----------
function render(t) {
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  if (state === S.MENU) { if (homeCanvas) ctx.drawImage(homeCanvas, 0, 0); return; }
  drawSky(ctx);
  const shx = (Math.random() - .5) * shake, shy = (Math.random() - .5) * shake;
  if (state === S.PLAY) {
    renderTower(shx, shy);
    drawBurjGauge(ctx);
  } else if (state === S.DEAD) {
    renderComparison();
  }
}

// ---------- boot ----------
resize();
reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
