<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>FlipStack</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: #2d1b4e; touch-action: manipulation;
    font-family: 'Arial Black', 'Avenir Next Condensed', Futura, system-ui, sans-serif;
    -webkit-user-select: none; user-select: none;
  }
  #game { display: block; width: 100vw; height: 100vh; }
  .ui {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    color: #fff7ec; pointer-events: none; z-index: 10;
  }
  .ui.hidden { display: none; }
  .ui h1 {
    font-size: clamp(46px, 11vw, 92px); margin: 0 0 4px;
    letter-spacing: 4px; font-weight: 900; line-height: 1;
    color: #fff3d6;
    text-shadow: 0 6px 0 rgba(120,40,80,.55), 0 0 60px rgba(255,180,100,.35);
  }
  .ui .tag {
    font-family: system-ui, sans-serif; font-weight: 600;
    opacity: .95; font-size: clamp(14px, 3vw, 17px); margin: 10px 0 30px;
    line-height: 1.7; text-shadow: 0 1px 8px rgba(40,10,50,.8);
  }
  .ui .tag b { color: #ffd97a; }
  .btn {
    pointer-events: auto; cursor: pointer; border: 0; border-radius: 0;
    padding: 18px 52px; font-size: 20px; font-weight: 900; letter-spacing: 3px;
    font-family: inherit; color: #3a1d4e;
    background: #ffd97a;
    box-shadow: 0 6px 0 #c98a3d; margin: 8px;
    transition: transform .08s ease, box-shadow .08s ease;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #c98a3d; }
  .btn.alt { background: #ff8c7a; box-shadow: 0 6px 0 #b84d54; color: #421c33; }
  .btn.alt:active { box-shadow: 0 2px 0 #b84d54; }
  .stat { font-family: system-ui, sans-serif; font-weight: 700; font-size: 15px; opacity: .9; margin-top: 20px; letter-spacing: 1px; text-shadow: 0 1px 8px rgba(40,10,50,.9); }
  #bigScore { font-size: clamp(64px, 15vw, 130px); font-weight: 900; margin: 0; text-shadow: 0 6px 0 rgba(120,40,80,.55); }
  #overSub { font-family: system-ui, sans-serif; font-weight: 700; font-size: 17px; opacity: .9; margin: 8px 0 26px; }
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 5;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 14px 18px; color: #fff7ec; pointer-events: none;
  }
  #hudScore { font-size: 50px; font-weight: 900; text-shadow: 0 4px 0 rgba(90,30,70,.5); }
  #hudRight {
    text-align: right; font-family: system-ui, sans-serif; font-weight: 700;
    font-size: 14px; letter-spacing: 1px; line-height: 1.7; opacity: .95;
    text-shadow: 0 1px 6px rgba(40,10,50,.7);
  }
  #toast {
    position: fixed; top: 24%; left: 0; right: 0; text-align: center;
    font-size: 28px; font-weight: 900; letter-spacing: 2px; color: #ffd97a; z-index: 6;
    pointer-events: none; opacity: 0; transition: opacity .18s, transform .18s;
    text-shadow: 0 3px 0 rgba(120,40,60,.6);
  }
  #flipWarn {
    position: fixed; bottom: 22%; left: 0; right: 0; text-align: center;
    font-size: 22px; font-weight: 900; color: #ff9ecb; z-index: 6;
    pointer-events: none; opacity: 0; letter-spacing: 4px;
    text-shadow: 0 0 24px rgba(255,120,180,.9);
  }
  .pulse { animation: pulse .45s ease infinite alternate; opacity: 1 !important; }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
  @media (prefers-reduced-motion: reduce) { .pulse { animation: none; opacity: 1 !important; } }

  /* power-up dock */
  #powerbar {
    position: fixed; bottom: 18px; left: 0; right: 0; z-index: 7;
    display: flex; justify-content: center; gap: 12px; pointer-events: none;
  }
  .pu {
    pointer-events: auto; cursor: pointer; width: 66px; height: 66px;
    border: 3px solid rgba(255,247,236,.9); border-radius: 0;
    background: rgba(58,29,78,.82); color: #fff7ec;
    font-size: 28px; line-height: 1; font-family: inherit;
    box-shadow: 0 5px 0 rgba(30,10,40,.7);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: transform .08s ease;
  }
  .pu:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(30,10,40,.7); }
  .pu small { font-size: 9px; font-weight: 900; letter-spacing: 1px; margin-top: 3px; font-family: system-ui, sans-serif; }
  .pu.special { border-color: #ffd97a; background: rgba(120,60,20,.85); box-shadow: 0 5px 0 #7a4415, 0 0 26px rgba(255,200,90,.5); }
  #effects {
    position: fixed; bottom: 96px; left: 0; right: 0; z-index: 7;
    display: flex; justify-content: center; gap: 8px; pointer-events: none;
    font-family: system-ui, sans-serif; font-weight: 800; font-size: 12px; letter-spacing: 1px;
  }
  .fx {
    color: #2d1b4e; background: #ffd97a; padding: 4px 10px;
    box-shadow: 0 3px 0 rgba(30,10,40,.5);
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud" style="display:none">
  <div id="hudScore">0</div>
  <div id="hudRight">
    <div id="hudBest">BEST 0</div>
    <div id="hudCoins">🪙 0</div>
    <div id="hudFlip">FLIP IN 10</div>
  </div>
</div>
<div id="toast"></div>
<div id="flipWarn">⚠ WORLD FLIP ⚠</div>
<div id="effects"></div>
<div id="powerbar"></div>

<div id="menu" class="ui">
  <h1>FLIPSTACK</h1>
  <div class="tag">Stack into the sunset. <b>3 perfects</b> in a row = power-up.<br>
  <b>5 in a row</b> = something golden. Every 10 blocks… the <b>world flips</b>.</div>
  <button class="btn" id="playBtn">PLAY</button>
  <div class="stat" id="menuBest">BEST 0</div>
</div>

<div id="over" class="ui hidden">
  <p id="bigScore">0</p>
  <p id="overSub">Best: 0</p>
  <button class="btn alt" id="continueBtn">▶ SAVE MY TOWER (AD)</button>
  <button class="btn" id="retryBtn">RETRY</button>
</div>

<script>
'use strict';
// ================================================================
// FlipStack v2 — isometric 3D stacking at sunset.
// Perfect-streak power-ups; the world flips every 10 blocks.
// ================================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1, ISO = 0;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ISO = Math.min(W, H) / 700; // pixels per world unit
}
window.addEventListener('resize', resize); resize();

// ---------- CrazyGames SDK (graceful fallback) ----------
let cgSdk = null;
(function initSdk() {
  const s = document.createElement('script');
  s.src = 'https://sdk.crazygames.com/crazygames-sdk-v3.js';
  s.onload = async () => {
    try { await window.CrazyGames.SDK.init(); cgSdk = window.CrazyGames.SDK; } catch (e) {}
  };
  s.onerror = () => {};
  document.head.appendChild(s);
})();
function sdkGameplayStart() { try { cgSdk && cgSdk.game.gameplayStart(); } catch (e) {} }
function sdkGameplayStop()  { try { cgSdk && cgSdk.game.gameplayStop(); } catch (e) {} }
function showRewardedAd(onReward) {
  if (cgSdk) {
    try {
      cgSdk.ad.requestAd('rewarded', { adFinished: onReward, adError: () => onReward() });
      return;
    } catch (e) {}
  }
  setTimeout(onReward, 800);
}

// ---------- Tuning (world units) ----------
const SIZE = 240;          // base block footprint (x and z)
const BH = 46;             // block height
const PERFECT = 9;         // perfect-drop tolerance
const TRAVEL = 420;        // mover travel limit from center
const SPEED0 = 240, SPEED_GAIN = 7, SPEED_MAX = 560;
const FLIP_EVERY = 10;
const FLIP_TIME = 0.7;

// ---------- Power-ups ----------
const PU = {
  slow:   { icon: '🐢', name: 'SLOW',   desc: 'SLOW-MO ×6 DROPS' },
  grow:   { icon: '🧱', name: 'GROW',   desc: 'BLOCK RESTORED' },
  shield: { icon: '🛡️', name: 'SHIELD', desc: 'SURVIVES ONE MISS' },
  sun:    { icon: '☀️', name: 'SUN',    desc: 'SUNBURST! AUTO-PERFECT ×5' },
};

// ---------- State ----------
const S = { MENU: 0, PLAY: 1, DEAD: 2 };
let state = S.MENU;
let stack = null, mover = null, debris = [], particles = [];
let score = 0, combo = 0, coins, best;
let flipT = 0, flipped = false, flipAnim = 0;
let camY = 0, camYT = 0, shake = 0;
let usedContinue = false;
let inventory = [];            // held power-ups (max 3)
let slowDrops = 0, sunDrops = 0, shieldOn = false;

best = +(localStorage.getItem('flipstack_best') || 0);
coins = +(localStorage.getItem('flipstack_coins') || 0);

function reset() {
  stack = [{ x: -SIZE / 2, z: -SIZE / 2, w: SIZE, d: SIZE }];
  debris = []; particles = [];
  score = 0; combo = 0;
  flipT = 0; flipped = false; flipAnim = 0;
  camY = 0; camYT = 0; shake = 0;
  usedContinue = false;
  inventory = []; slowDrops = 0; sunDrops = 0; shieldOn = false;
  renderPowerbar(); renderEffects();
  newMover();
}

function newMover() {
  const top = stack[stack.length - 1];
  const axis = stack.length % 2 === 1 ? 'x' : 'z'; // alternate like the original
  const speed = Math.min(SPEED0 + score * SPEED_GAIN, SPEED_MAX);
  mover = {
    axis, speed,
    w: top.w, d: top.d,
    x: top.x, z: top.z,
    pos: -TRAVEL, dir: 1,
    wobble: Math.random() * 6,
  };
  if (Math.random() < 0.5) { mover.pos = TRAVEL; mover.dir = -1; }
}
function moverRect() {
  // resolve pos into world x/z
  const m = mover, top = stack[stack.length - 1];
  if (m.axis === 'x') return { x: m.pos - m.w / 2, z: top.z, w: m.w, d: m.d };
  return { x: top.x, z: m.pos - m.d / 2, w: m.w, d: m.d };
}

// ---------- Input ----------
function press(e) {
  if (e && e.type === 'keydown') {
    if (e.code === 'Digit1') return usePower(0);
    if (e.code === 'Digit2') return usePower(1);
    if (e.code === 'Digit3') return usePower(2);
    if (e.code !== 'Space') return;
  }
  if (e) e.preventDefault();
  if (state === S.PLAY && flipT <= 0) drop();
}
canvas.addEventListener('pointerdown', press);
window.addEventListener('keydown', press);

// ---------- Core mechanic ----------
function drop() {
  const top = stack[stack.length - 1];
  const r = moverRect();
  const axis = mover.axis;
  const mPos = axis === 'x' ? r.x : r.z;
  const mLen = axis === 'x' ? r.w : r.d;
  const tPos = axis === 'x' ? top.x : top.z;
  const tLen = axis === 'x' ? top.w : top.d;

  const left = Math.max(mPos, tPos);
  const right = Math.min(mPos + mLen, tPos + tLen);
  let overlap = right - left;

  if (overlap <= 0) {
    if (shieldOn) {
      shieldOn = false; renderEffects();
      toast('🛡️ SHIELD SAVED YOU');
      shake = 8; newMover(); return;
    }
    return die();
  }

  let offset = Math.abs((mPos + mLen / 2) - (tPos + tLen / 2));
  let perfect = offset <= PERFECT;

  // Sunburst: generous magnet snap counts as perfect
  if (!perfect && sunDrops > 0 && offset < tLen * 0.45) perfect = true;
  if (sunDrops > 0) { sunDrops--; renderEffects(); }

  const block = { x: r.x, z: r.z, w: r.w, d: r.d };
  if (perfect) {
    combo++;
    if (axis === 'x') { block.x = tPos; block.w = tLen; block.d = top.d; block.z = top.z; }
    else { block.z = tPos; block.d = tLen; block.w = top.w; block.x = top.x; }
    stack.push(block);
    burst(block, 26);
    shake = 6;
    if (combo === 3) awardPower(false);
    else if (combo === 5) awardPower(true);
    else toast('PERFECT ×' + combo);
    coins += 2;
  } else {
    combo = 0;
    // shed the cut piece
    const cutLen = mLen - overlap;
    if (cutLen > 1) {
      const cutPos = mPos < tPos ? mPos : right;
      const dPiece = axis === 'x'
        ? { x: cutPos, z: block.z, w: cutLen, d: block.d }
        : { x: block.x, z: cutPos, w: block.w, d: cutLen };
      dPiece.row = stack.length; dPiece.vy = 60; dPiece.fall = 0;
      debris.push(dPiece);
    }
    if (axis === 'x') { block.x = left; block.w = overlap; }
    else { block.z = left; block.d = overlap; }
    stack.push(block);
    burst(block, 8);
    coins += 1;
  }

  score++;
  localStorage.setItem('flipstack_coins', coins);
  updateHud();
  camYT = Math.max(0, (stack.length - 5) * BH);

  if (score % FLIP_EVERY === 0) {
    flipT = FLIP_TIME;
    warnEl.classList.add('pulse');
    setTimeout(() => warnEl.classList.remove('pulse'), FLIP_TIME * 1000);
  }
  newMover();
}

function die() {
  state = S.DEAD;
  sdkGameplayStop();
  combo = 0;
  if (score > best) { best = score; localStorage.setItem('flipstack_best', best); }
  const r = moverRect();
  debris.push({ ...r, row: stack.length, vy: 30, fall: 0 });
  bigScoreEl.textContent = score;
  overSubEl.textContent = 'Best: ' + best + '   🪙 ' + coins;
  continueBtn.style.display = usedContinue ? 'none' : '';
  overEl.classList.remove('hidden');
  hudEl.style.display = 'none';
}

// ---------- Power-ups ----------
function awardPower(special) {
  if (special) {
    give('sun');
    toast('PERFECT ×5 — ☀️ SUNBURST EARNED!');
  } else {
    const basics = ['slow', 'grow', 'shield'];
    const id = basics[Math.floor(Math.random() * basics.length)];
    give(id);
    toast('PERFECT ×3 — ' + PU[id].icon + ' ' + PU[id].name + ' EARNED!');
  }
}
function give(id) {
  if (inventory.length >= 3) inventory.shift();
  inventory.push(id);
  renderPowerbar();
}
function usePower(i) {
  if (state !== S.PLAY || i >= inventory.length) return;
  const id = inventory.splice(i, 1)[0];
  renderPowerbar();
  if (id === 'slow') { slowDrops = 6; }
  if (id === 'grow') {
    const top = stack[stack.length - 1];
    const cx = top.x + top.w / 2, cz = top.z + top.d / 2;
    top.w = Math.min(SIZE, top.w + SIZE * 0.35);
    top.d = Math.min(SIZE, top.d + SIZE * 0.35);
    top.x = cx - top.w / 2; top.z = cz - top.d / 2;
    mover.w = top.w; mover.d = top.d;
    burst(top, 20);
  }
  if (id === 'shield') { shieldOn = true; }
  if (id === 'sun') { sunDrops = 5; }
  toast(PU[id].icon + ' ' + PU[id].desc);
  renderEffects();
}
function renderPowerbar() {
  powerbarEl.innerHTML = '';
  inventory.forEach((id, i) => {
    const b = document.createElement('button');
    b.className = 'pu' + (id === 'sun' ? ' special' : '');
    b.innerHTML = PU[id].icon + '<small>' + PU[id].name + '</small>';
    b.addEventListener('pointerdown', ev => { ev.stopPropagation(); usePower(i); });
    powerbarEl.appendChild(b);
  });
}
function renderEffects() {
  const fx = [];
  if (slowDrops > 0) fx.push('🐢 ' + slowDrops);
  if (sunDrops > 0) fx.push('☀️ ' + sunDrops);
  if (shieldOn) fx.push('🛡️ ARMED');
  effectsEl.innerHTML = fx.map(f => '<span class="fx">' + f + '</span>').join('');
}

// ---------- Particles ----------
function burst(block, n) {
  const cx = block.x + block.w / 2, cz = block.z + block.d / 2;
  const y = stack.length * BH;
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, v = 80 * (0.4 + Math.random());
    particles.push({
      x: cx + Math.cos(a) * block.w * 0.4, z: cz + Math.sin(a) * block.d * 0.4,
      y, vy: 120 + Math.random() * 120, life: 0.7 + Math.random() * 0.4,
    });
  }
}

// ---------- HUD / UI ----------
const menuEl = document.getElementById('menu');
const overEl = document.getElementById('over');
const hudEl = document.getElementById('hud');
const hudScoreEl = document.getElementById('hudScore');
const hudBestEl = document.getElementById('hudBest');
const hudCoinsEl = document.getElementById('hudCoins');
const hudFlipEl = document.getElementById('hudFlip');
const toastEl = document.getElementById('toast');
const warnEl = document.getElementById('flipWarn');
const bigScoreEl = document.getElementById('bigScore');
const overSubEl = document.getElementById('overSub');
const continueBtn = document.getElementById('continueBtn');
const powerbarEl = document.getElementById('powerbar');
const effectsEl = document.getElementById('effects');
document.getElementById('menuBest').textContent = 'BEST ' + best;

function updateHud() {
  hudScoreEl.textContent = score;
  hudBestEl.textContent = 'BEST ' + Math.max(best, score);
  hudCoinsEl.textContent = '🪙 ' + coins;
  const left = FLIP_EVERY - (score % FLIP_EVERY);
  hudFlipEl.textContent = 'FLIP IN ' + left;
  hudFlipEl.style.color = left <= 3 ? '#ff9ecb' : '';
}
let toastTimer = 0;
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.style.opacity = 1;
  toastEl.style.transform = 'scale(1.12)';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toastEl.style.opacity = 0; toastEl.style.transform = 'scale(1)';
  }, 1100);
}

function startGame() {
  reset();
  state = S.PLAY;
  menuEl.classList.add('hidden');
  overEl.classList.add('hidden');
  hudEl.style.display = 'flex';
  updateHud();
  sdkGameplayStart();
}
document.getElementById('playBtn').addEventListener('click', startGame);
document.getElementById('retryBtn').addEventListener('click', startGame);
continueBtn.addEventListener('click', () => {
  continueBtn.disabled = true;
  showRewardedAd(() => {
    continueBtn.disabled = false;
    usedContinue = true;
    state = S.PLAY;
    overEl.classList.add('hidden');
    hudEl.style.display = 'flex';
    newMover();
    sdkGameplayStart();
  });
});

// ---------- Projection ----------
// world (x, z, y-up) -> screen. Classic 2:1-ish isometric.
function px(x, z) { return W / 2 + (x - z) * 0.866 * ISO; }
function py(x, z, y) { return H * 0.72 - y * ISO * 0.9 + (x + z) * 0.5 * ISO + camY * ISO * 0.9; }

function faceColors(i) {
  // sunset journey: coral -> rose -> magenta -> violet -> deep blue
  const hue = (25 - i * 7 + 3600) % 360;
  const sat = 62;
  return {
    top:   `hsl(${hue}, ${sat}%, 68%)`,
    right: `hsl(${hue}, ${sat}%, 52%)`,
    left:  `hsl(${hue}, ${sat}%, 38%)`,
  };
}

function drawBox(b, row, yOverride, colors) {
  const yB = (yOverride !== undefined ? yOverride : row * BH);
  const yT = yB + BH;
  const x0 = b.x, x1 = b.x + b.w, z0 = b.z, z1 = b.z + b.d;
  const c = colors || faceColors(row);
  // top face
  ctx.fillStyle = c.top;
  ctx.beginPath();
  ctx.moveTo(px(x0, z0), py(x0, z0, yT));
  ctx.lineTo(px(x1, z0), py(x1, z0, yT));
  ctx.lineTo(px(x1, z1), py(x1, z1, yT));
  ctx.lineTo(px(x0, z1), py(x0, z1, yT));
  ctx.closePath(); ctx.fill();
  // right face (+x)
  ctx.fillStyle = c.right;
  ctx.beginPath();
  ctx.moveTo(px(x1, z0), py(x1, z0, yT));
  ctx.lineTo(px(x1, z1), py(x1, z1, yT));
  ctx.lineTo(px(x1, z1), py(x1, z1, yB));
  ctx.lineTo(px(x1, z0), py(x1, z0, yB));
  ctx.closePath(); ctx.fill();
  // left face (+z)
  ctx.fillStyle = c.left;
  ctx.beginPath();
  ctx.moveTo(px(x0, z1), py(x0, z1, yT));
  ctx.lineTo(px(x1, z1), py(x1, z1, yT));
  ctx.lineTo(px(x1, z1), py(x1, z1, yB));
  ctx.lineTo(px(x0, z1), py(x0, z1, yB));
  ctx.closePath(); ctx.fill();
}

// ---------- Render / loop ----------
let last = performance.now();
function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;
  update(dt, now / 1000);
  render(now / 1000);
  requestAnimationFrame(loop);
}

function update(dt, t) {
  camY += (camYT - camY) * Math.min(1, dt * 5);
  if (shake > 0) shake = Math.max(0, shake - dt * 30);

  if (flipT > 0) {
    flipT -= dt;
    if (flipT <= 0) flipped = !flipped;
  }
  flipAnim += (((flipped ? 1 : 0) + (flipT > 0 ? (1 - flipT / FLIP_TIME) * (flipped ? -1 : 1) : 0)) - flipAnim) * Math.min(1, dt * 12);

  if (state === S.PLAY) {
    const wob = 1 + 0.22 * Math.sin(t * 2.1 + mover.wobble);
    const slowMul = slowDrops > 0 ? 0.55 : 1;
    mover.pos += mover.dir * mover.speed * wob * slowMul * dt;
    if (mover.pos < -TRAVEL) { mover.pos = -TRAVEL; mover.dir = 1; }
    if (mover.pos > TRAVEL) { mover.pos = TRAVEL; mover.dir = -1; }
  }

  for (const d of debris) { d.vy += 1400 * dt; d.fall += d.vy * dt; }
  debris = debris.filter(d => d.fall < 4000);

  for (const p of particles) { p.y -= p.vy * dt; p.vy -= 300 * dt; p.life -= dt; }
  particles = particles.filter(p => p.life > 0);

  // consume slow-mo per placed block (tracked via score change) — handled in drop via slowDrops
}

// track slow-mo drops: decrement when a block lands
const _origDrop = drop;
drop = function () {
  const before = score;
  _origDrop();
  if (score > before && slowDrops > 0) { slowDrops--; renderEffects(); }
};

function render(t) {
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  // ----- sunset sky, deepening to night with altitude -----
  const alt = Math.min(stack ? stack.length : 0, 80) / 80;
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, mix('#2d1b4e', '#0b0820', alt));
  g.addColorStop(0.45, mix('#7a3b6e', '#1a1038', alt));
  g.addColorStop(0.75, mix('#f08a5d', '#3a2050', alt));
  g.addColorStop(1, mix('#f9d976', '#553063', alt));
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // sun sinking as you climb
  const sunY = H * (0.62 + alt * 0.5);
  const sg = ctx.createRadialGradient(W / 2, sunY, 10, W / 2, sunY, H * 0.35);
  sg.addColorStop(0, 'rgba(255,230,160,.9)');
  sg.addColorStop(0.25, 'rgba(255,190,120,.45)');
  sg.addColorStop(1, 'rgba(255,150,100,0)');
  ctx.fillStyle = sg;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffe9b0';
  ctx.beginPath(); ctx.arc(W / 2, sunY, Math.min(W, H) * 0.09, 0, Math.PI * 2); ctx.fill();

  // stars fade in at altitude
  if (alt > 0.15) {
    ctx.fillStyle = `rgba(255,245,225,${(alt - 0.15) * 0.5})`;
    for (let i = 0; i < 50; i++) {
      const sx = (i * 97 + 31) % W;
      const sy = (i * 211 + 57) % (H * 0.6);
      ctx.fillRect(sx, sy, 2, 2);
    }
  }

  // haze band at horizon
  ctx.fillStyle = 'rgba(255,210,150,.12)';
  ctx.fillRect(0, H * 0.68, W, H * 0.05);

  if (!stack) return;

  ctx.save();
  const a = flipAnim * Math.PI;
  ctx.translate(W / 2, H / 2);
  ctx.rotate(a);
  ctx.translate(-W / 2, -H / 2);
  const shx = (Math.random() - .5) * shake, shy = (Math.random() - .5) * shake;
  ctx.translate(shx, shy);

  // ground shadow
  const base = stack[0];
  ctx.fillStyle = 'rgba(40,10,50,.3)';
  ctx.beginPath();
  const gy = py(0, 0, -4);
  ctx.ellipse(px(base.x + base.w / 2, base.z + base.d / 2), gy, base.w * ISO * 1.15, base.w * ISO * 0.45, 0, 0, Math.PI * 2);
  ctx.fill();

  // stack (bottom-up)
  const firstVisible = Math.max(0, stack.length - 24);
  for (let i = firstVisible; i < stack.length; i++) drawBox(stack[i], i);

  // debris
  for (const d of debris) {
    const y = d.row * BH - d.fall;
    const c = faceColors(d.row);
    drawBox(d, d.row, y, { top: c.top, right: 'hsl(8, 60%, 45%)', left: 'hsl(8, 60%, 32%)' });
  }

  // mover
  if (state === S.PLAY) {
    const r = moverRect();
    const row = stack.length;
    const c = faceColors(row);
    if (sunDrops > 0) { c.top = '#ffe9a8'; c.right = '#f2b95c'; c.left = '#cc8f3a'; }
    drawBox(r, row, undefined, c);
    // crisp guide edges on the top block
    const top = stack[stack.length - 1];
    ctx.strokeStyle = 'rgba(255,247,236,.5)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 6]);
    ctx.beginPath();
    const yT = (row + 1) * BH, yB = row * BH;
    if (mover.axis === 'x') {
      ctx.moveTo(px(top.x, top.z), py(top.x, top.z, yB));
      ctx.lineTo(px(top.x, top.z), py(top.x, top.z, yT));
      ctx.moveTo(px(top.x + top.w, top.z), py(top.x + top.w, top.z, yB));
      ctx.lineTo(px(top.x + top.w, top.z), py(top.x + top.w, top.z, yT));
    } else {
      ctx.moveTo(px(top.x, top.z), py(top.x, top.z, yB));
      ctx.lineTo(px(top.x, top.z), py(top.x, top.z, yT));
      ctx.moveTo(px(top.x, top.z + top.d), py(top.x, top.z + top.d, yB));
      ctx.lineTo(px(top.x, top.z + top.d), py(top.x, top.z + top.d, yT));
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // particles
  for (const p of particles) {
    ctx.globalAlpha = Math.max(p.life, 0);
    ctx.fillStyle = '#ffd97a';
    ctx.fillRect(px(p.x, p.z) - 3, py(p.x, p.z, p.y) - 3, 6, 6);
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  warnEl.style.opacity = flipT > 0 ? 1 : (state === S.PLAY && score % FLIP_EVERY >= FLIP_EVERY - 2 && score > 0 ? 0.55 : 0);
}

// tiny hex mixer for the sky
function mix(h1, h2, k) {
  const a = parseInt(h1.slice(1), 16), b = parseInt(h2.slice(1), 16);
  const r = Math.round(((a >> 16) & 255) * (1 - k) + ((b >> 16) & 255) * k);
  const g = Math.round(((a >> 8) & 255) * (1 - k) + ((b >> 8) & 255) * k);
  const bl = Math.round((a & 255) * (1 - k) + (b & 255) * k);
  return `rgb(${r},${g},${bl})`;
}

requestAnimationFrame(loop);
</script>
